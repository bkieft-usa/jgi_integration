analysis:

  # ── Track (inferred automatically — do not set here) ─────────────────────────
  # The workflow track (sample_resolution vs condition_resolution) is determined
  # by the scaling.method set for each dataset in data_processing.yml:
  #   lfc | moderated_lfc  →  condition_resolution  (features × contrasts)
  #   all other methods    →  sample_resolution      (features × samples)
  # All datasets must use the same scaling family or an error is raised at startup.

  feature_grouping:
    method: hierarchical_clustering  # network_modules | hierarchical_clustering | hdbscan | nmf | leiden_knn
    params:

      ###   network_modules         # Pearson/Spearman correlation → graph → Louvain/Leiden community detection.
      # corr_method: pearson        # pearson | spearman
      # corr_cutoff: 0.9            # minimum |correlation| to draw an edge
      # keep_negative: false        # include anti-correlated edges
      # block_size: 500             # features per block for block-wise correlation
      # cores: -1                   # parallel workers (-1 = all available)
      # corr_mode: bipartite        # bipartite | full
      # submodule_mode: louvain     # louvain | leiden
      # network_layout: spring      # spring | kamada_kawai | circular
      # show_network_plot: false    # set true to render interactive network inline in notebook

      ###   hierarchical_clustering # scipy agglomerative clustering on feature vectors.
      distance_metric: correlation  # scipy pdist metric; 'correlation' = 1 − Pearson r
      linkage_method: ward          # single | complete | average | ward
      height_cutoff: 0.75            # dendrogram height at which to cut clusters (0–1)

      ###   hdbscan                   # HDBSCAN density-based clustering (no k required).
      # metric: correlation           # euclidean | correlation (precomputed)
      # min_cluster_size: 5           # minimum samples in a cluster (larger = more conservative)
      # min_samples: 3                # minimum samples in a neighborhood (larger = more conservative)

      ###   nmf                       # Non-negative Matrix Factorization; k chosen automatically via reconstruction-error elbow.
      # k_min: 2                      # minimum number of components to evaluate
      # k_max: 50                     # maximum number of components to evaluate
      # n_runs: 3                     # random restarts per k for stability
      # max_iter: 500                 # NMF iterations per run

      ###   leiden_knn                # Leiden community detection on an approximate k-NN graph
      # n_neighbors: 15               # k-NN graph connectivity
      # resolution_min: 0.1           # lower bound of resolution sweep
      # resolution_max: 2.0           # upper bound of resolution sweep
      # resolution_steps: 20          # number of resolution values to evaluate

  # ── Feature selection (applied to the integrated matrix before grouping) ──────
  feature_selection:
    method: variance         # variance | feature_list
    params:

      # --- variance (set method above and uncomment) ---
      top_n: 10000            # number of top-variance features to keep
      max_features: 10000    # hard cap on features passed to grouping step

      # --- feature_list (set method above and uncomment) ---
      # feature_list_file:

  # ── Pathway enrichment (compare_groups_to_pathways) ──────────────────────────
  pathway_enrichment:
    top_n: 50                  # number of top-ranked pathways to show in heatmap
    rank_by: n_features        # n_features | cumulative_abs_lfc
    exclude_nopathway: true    # exclude pathways with no canonical name
    min_group_size: 10          # drop groups with fewer than this many features
    show_only_sig: false       # show only pathways significantly enriched in ≥1 group
    bipartite_only: false      # keep only pathways with features from every data type
    alpha: 0.05                # FDR significance threshold for enrichment test

