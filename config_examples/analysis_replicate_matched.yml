# analysis_replicate_matched.yml
#
# Analysis configuration for the replicate-matched branch.
#
# Use this config when biological replicates ARE paired across data types
# (e.g., TX and MX samples were collected from the same biological material
# at the same time points, and sample IDs match across datasets).
#
# Pipeline:
#   replicate_filtered_data  →  scale_data (per dataset, brings data types to comparable scale)
#                            →  scaled_data  →  integrate_data (concatenate)
#                            →  integrated_data  →  normalize_integrated_data (optional)
#                            →  integrated_data_selected (features × samples)
#                            →  feature_selection  →  feature_grouping
#
# NOTE: Parameters with XXX should not be changed

analysis:

  # Per-dataset scaling — applied independently to each dataset before concatenation.
  # This brings different data types (RNA counts, metabolite peak heights) to a
  # comparable scale before they are concatenated into a single matrix.
  scaling:
    method: vst              # vst | zscore | modified_zscore | rank_normal | quantile | none
    params:
      log2: true             # log2-transform before scaling (used by zscore/modified_zscore)

  # Optional post-integration normalization — applied to the concatenated scaled matrix.
  # Set method: null to skip (data is already per-dataset scaled).
  post_integration:
    method: null             # null (skip) | zscore | modified_zscore | rank_normal
    params:
      log2: false            # log2-transform before post-integration scaling (usually false)

  # Feature selection — all methods are valid in this branch
  feature_selection:
    method: kruskalwallis    # lfc | variance | glm | kruskalwallis | feature_list | lasso | random_forest | mutual_info
    params:
      category: group        # metadata column containing the grouping variable
      significance_level: 0.05
      lfc_cutoff: 0.25       # minimum |LFC| secondary filter
      max_features: 10000    # hard cap on features passed to grouping step

      # --- lfc (uncomment when method: lfc) ---
      # log2fc_cutoff: 1.25

      # --- variance (uncomment when method: variance) ---
      # top_n: 5000

      # --- glm (uncomment when method: glm) ---
      # category:
      # reference:
      # significance_level: 0.05
      # log2fc_cutoff: 0.25

      # --- feature_list (uncomment when method: feature_list) ---
      # feature_list_file:

      # --- lasso / random_forest / mutual_info (uncomment when using these) ---
      # category:

  # Feature grouping — group features by abundance pattern similarity
  feature_grouping:
    method: hierarchical_clustering  # network_modules | hierarchical_clustering | hdbscan
    params:
      # --- hierarchical_clustering ---
      distance_metric: correlation   # scipy pdist metric; 'correlation' = 1 − Pearson r
      linkage_method: average        # single | complete | average | ward
      height_cutoff: 0.3             # dendrogram cut height (analogous to 1 − corr_cutoff)

      # --- network_modules (set method above and uncomment) ---
      # corr_method: spearman
      # corr_cutoff: 0.9
      # keep_negative: false
      # block_size: 500
      # cores: -1
      # corr_mode: bipartite
      # submodule_mode: louvain
      # interactive_plot: false
      # network_layout: spring

      # --- hdbscan (set method above and uncomment) ---
      # metric: correlation
      # min_cluster_size: 5
      # min_samples: 3

  # Functional enrichment (optional post-grouping step)
  functional_enrichment:
    method: hypergeometric
    params:
      annotation_column: GO
      pvalue_cutoff: 0.05
      min_genes_per_term: 1
      correction_method: fdr_bh  # fdr_bh | bonferroni | none
