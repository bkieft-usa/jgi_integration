# analysis_lfc.yml
#
# Analysis configuration for the LFC (log2 fold-change) branch.
#
# Use this config when biological replicates are NOT paired across data types
# (e.g., TX and MX samples were collected independently, or from different organisms).
#
# Pipeline:
#   replicate_filtered_data  →  integrate_data (LFC of group medians)
#                            →  integrated_data_selected (features × contrasts)
#                            →  feature_selection  →  feature_grouping
#
# Per-dataset scaling is NOT applied — LFC is scale-invariant (ratios cancel
# absolute differences between RNA counts and metabolite peak heights).
# normalize_integrated_data() is NOT called in this branch.
#
# NOTE: Parameters with XXX should not be changed

analysis:

  # LFC computation parameters
  lfc:
    group_col: group          # metadata column containing group/condition labels
    sample_col: unique_group  # metadata column containing unique sample identifiers
    pseudocount: 1.0          # added before log2 to avoid log(0)
    lfc_pairs: null           # null = all pairwise contrasts; or list of [groupA, groupB] pairs

  # Feature selection — only lfc and variance are valid in this branch
  feature_selection:
    method: lfc              # lfc | variance | feature_list
    params:
      log2fc_cutoff: 1.25    # minimum |log2FC| to retain a feature
      max_features: 10000    # hard cap on features passed to grouping step

  # Feature grouping — group features by LFC pattern similarity
  feature_grouping:
    method: network_modules  # network_modules | hierarchical_clustering | hdbscan
    params:
      # --- network_modules ---
      corr_method: spearman       # spearman | pearson | dcor
      corr_cutoff: 0.9            # minimum |correlation| to draw an edge
      keep_negative: false        # include anti-correlated edges
      block_size: 500             # features per block for block-wise correlation
      cores: -1                   # parallel workers (-1 = all available)
      corr_mode: bipartite        # bipartite | full
      submodule_mode: louvain     # louvain | leiden
      interactive_plot: false
      network_layout: spring      # spring | kamada_kawai | circular

      # --- hierarchical_clustering (set method above and uncomment) ---
      # distance_metric: correlation  # scipy pdist metric; 'correlation' = 1 − Pearson r
      # linkage_method: average       # single | complete | average | ward
      # height_cutoff: 0.3

      # --- hdbscan (set method above and uncomment) ---
      # metric: correlation
      # min_cluster_size: 5
      # min_samples: 3

  # Functional enrichment (optional post-grouping step)
  functional_enrichment:
    method: hypergeometric
    params:
      annotation_column: GO
      pvalue_cutoff: 0.05
      min_genes_per_term: 1
      correction_method: fdr_bh  # fdr_bh | bonferroni | none
